spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/cocoland_schema?useSSL=false&characterEncoding=UTF-8&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123456}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
# Hibernate will automatically detect the dialect based on the connection URL

server.port=${PORT:8080}

# File upload
app.upload.dir=uploads/
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Email (Gmail - cấu hình GMAIL_USER, GMAIL_PASS qua env hoặc sửa trực tiếp ở đây)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USER:}
spring.mail.password=${GMAIL_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Zalo ZNS (tuỳ chọn)
zalo.access-token=${ZALO_ACCESS_TOKEN:}
zalo.template-id=${ZALO_TEMPLATE_ID:}
